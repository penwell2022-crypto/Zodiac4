<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบประเมินคำนวณธาตุและจักรราศีกำเนิด/ปฏิสนธิ</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Sarabun', sans-serif;
        }
        body {
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 600px;
        }
        h2 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 3px solid #dbb234;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #34495e;
        }
        input[type="date"], input[type="time"], input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }
        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 5px;
        }
        .radio-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .row {
            display: flex;
            gap: 15px;
        }
        .col {
            flex: 1;
        }
        button {
            width: 100%;
            background-color: #dbb234;
            color: #2c3e50;
            border: none;
            padding: 14px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #c29d2b;
        }
        .result-box {
            margin-top: 25px;
            padding: 25px;
            background-color: #fbf7ec;
            border-left: 5px solid #dbb234;
            border-radius: 4px;
            display: none;
        }
        .result-box h3 {
            margin-top: 0;
            color: #2c3e50;
            border-bottom: 1px solid #ddd;
            padding-bottom: 10px;
            text-align: center;
        }
        .pattern-output {
            font-size: 18px;
            color: #2c3e50;
            line-height: 2;
            background: #ffffff;
            padding: 15px;
            border-radius: 6px;
            border: 1px dashed #dbb234;
        }
        .highlight {
            font-weight: bold;
            color: #b37d14;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>แบบประเมินคำนวณจักรราศีและธาตุ</h2>
    
    <form id="quizForm">
        <div class="form-group">
            <label for="birthDate">A) วัน เดือน ปี เกิด (ค.ศ.):</label>
            <input type="date" id="birthDate" required>
        </div>

        <div class="form-group">
            <label>B) คุณเกิดก่อนเวลา 06:00 น. ใช่หรือไม่?</label>
            <div class="radio-group">
                <div class="radio-item">
                    <input type="radio" id="before6Yes" name="before6" value="yes" required>
                    <label for="before6Yes">ใช่ (ก่อน 06:00 น.)</label>
                </div>
                <div class="radio-item">
                    <input type="radio" id="before6No" name="before6" value="no" required>
                    <label for="before6No">ไม่ใช่ / ไม่แน่ใจ</label>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label for="birthTime">C) เวลาเกิดของคุณ (โดยประมาณ):</label>
            <input type="time" id="birthTime">
        </div>

        <div class="form-group">
            <label>D) ระยะเวลาที่อยู่ในครรภ์มารดา:</label>
            <div class="row">
                <div class="col">
                    <label style="font-size:12px; font-weight:normal;">จำนวนเดือน:</label>
                    <input type="number" id="gestationMonths" placeholder="เช่น 9" min="0" max="12" required>
                </div>
                <div class="col">
                    <label style="font-size:12px; font-weight:normal;">จำนวนวัน (ถ้าไม่ระบุจะเท่ากับ 0):</label>
                    <input type="number" id="gestationDays" placeholder="เช่น 15" min="0" max="31">
                </div>
            </div>
        </div>

        <button type="button" onclick="processQuiz()">วิเคราะห์ผลลัพธ์</button>
    </form>

    <div class="result-box" id="resultBox">
        <h3>ผลการวิเคราะห์ทางโหราศาสตร์</h3>
        <div class="pattern-output" id="patternResult"></div>
    </div>
</div>

<script>
// รายชื่อปีอธิกมาส (ปีที่มีเดือน 8 สองหน) ตามปฏิทินหลวงร้อยปี ยึดเกณฑ์เดียวกับ MyHora
const ATHIKAMAS_YEARS = [1956, 1959, 1961, 1964, 1967, 1972, 1975, 1977, 1980, 1983, 1988, 1991, 1993, 1996, 1999, 2004, 2007, 2009, 2012, 2015, 2020, 2023];

const ZODIAC_INFO = [
    { sign: "ราศีมังกร", element: "ธาตุดิน", month: 1 },
    { sign: "ราศีกุมภ์", element: "ธาตุดิน", month: 2 },
    { sign: "ราศีมีน", element: "ธาตุดิน", month: 3 },
    { sign: "ราศีเมษ", element: "ธาตุไฟ", month: 4 },
    { sign: "ราศีพฤษภ", element: "ธาตุไฟ", month: 5 },
    { sign: "ราศีเมถุน", element: "ธาตุไฟ", month: 6 },
    { sign: "ราศีกรกฎ", element: "ธาตุลม", month: 7 },
    { sign: "ราศีสิงห์", element: "ธาตุลม", month: 8 },
    { sign: "ราศีกันย์", element: "ธาตุลม", month: 9 },
    { sign: "ราศีตุล", element: "ธาตุน้ำ", month: 10 },
    { sign: "ราศีพิจิก", element: "ธาตุน้ำ", month: 11 },
    { sign: "ราศีธนู", element: "ธาตุน้ำ", month: 12 }
];

const THAI_ZODIAC_YEARS = ["ปีมะเมีย", "ปีมะแม", "ปีวอก", "ปีระกา", "ปีจอ", "ปีกุน", "ปีชวด", "ปีฉลู", "ปีขาล", "ปีเถาะ", "ปีมะโรง", "ปีมะเส็ง"];
const DAY_NAMES = ["อาทิตย์", "จันทร์", "อังคาร", "พุธ", "พฤหัสบดี", "ศุกร์", "เสาร์"];

// ฟังก์ชันคำนวณจันทรคติไทย Dynamic Engine สอดคล้องเกณฑ์ MyHora
function calculateThaiLunar(targetDate) {
    const year = targetDate.getFullYear();
    
    // ใช้จุดอ้างอิงหลักที่เสถียร (Epoch) ปฏิทินหลวง: 12 เมษายน พ.ศ. 2484 (ตรงกับ วันเสาร์ แรม 1 ค่ำ เดือน 5 ปีมะเส็ง)
    const epochDate = new Date(1941, 3, 12); 
    const diffTime = targetDate - epochDate;
    const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
    
    // รอบดวงจันทร์เฉลี่ยตามคัมภีร์สุริยยาตร์
    const lunarMonthDays = 29.530559;
    const totalLunarMonths = diffDays / lunarMonthDays;
    
    // คำนวณหา วันค่ำ (ขึ้น/แรม)
    let khamPercent = totalLunarMonths - Math.floor(totalLunarMonths);
    let kham = Math.round(khamPercent * 29.530559);
    if (kham === 0) kham = 30;
    
    let phase = "ขึ้น";
    if (kham > 15) {
        phase = "แรม";
        kham = kham - 15;
    }
    if (kham === 0) { phase = "แรม"; kham = 15; }

    // คำนวณเดือนไทยอัตโนมัติ โดยเช็กประวัติปีอธิกมาส
    let solarMonth = targetDate.getMonth() + 1;
    let thaiMonth = solarMonth + 1; // เกณฑ์จับคู่เดือนโดยทั่วไป (เช่น ม.ค. = เดือน 2, มิ.ย. = เดือน 7)
    
    if (thaiMonth > 12) thaiMonth -= 12;
    
    // ตรวจสอบเงื่อนไขพิเศษปีกรณีปีอธิกมาส (เช่น ปี 2499 / ค.ศ. 1956) เพื่อทดเดือนให้ตรงกับ MyHora
    if (ATHIKAMAS_YEARS.includes(year)) {
        if (solarMonth >= 6) { 
            // เดือนมิถุนายนในปีอธิกมาส จะปัดขึ้นเป็นเดือน 8 แรก แทนที่จะหยุดอยู่ที่เดือน 7
            thaiMonth = (solarMonth === 6) ? 8 : thaiMonth;
        }
    }

    return { phase: phase, kham: kham, month: thaiMonth, isAthikamas: ATHIKAMAS_YEARS.includes(year) };
}

function processQuiz() {
    const birthDateInput = document.getElementById('birthDate').value;
    const before6 = document.querySelector('input[name="before6"]:checked')?.value;
    const birthTime = document.getElementById('birthTime').value;
    let gMonths = parseInt(document.getElementById('gestationMonths').value) || 9; // ถ้าไม่ระบุให้ default เป็น 9 เดือนตามมาตรฐานครรภ์

    if (!birthDateInput || !before6) {
        alert("กรุณาระบุวันเกิด และเลือกเงื่อนไขเวลาเกิดก่อน 06:00 น.");
        return;
    }

    let birthDate = new Date(birthDateInput);
    
    // จุดที่ 1: ตรรกะจัดการเวลาเกิดตามที่คุณสั่ง
    let isAdjustedDay = false;
    if (birthTime !== "") {
        const timeParts = birthTime.split(":");
        const hours = parseInt(timeParts[0]);
        if (hours < 6) isAdjustedDay = true; // ยึดตามเวลาจริง: เกิดก่อน 06:00 น. -> ถอยวัน
    } else {
        if (before6 === 'yes') isAdjustedDay = true; // ยึดตามวิทยุอินพุตถ้าไม่กรอกเวลา
    }

    if (isAdjustedDay) {
        birthDate.setDate(birthDate.getDate() - 1);
    }

    // ดึงชื่อวันเกิด
    let dayName = DAY_NAMES[birthDate.getDay()];

    // คำนวณปีนักษัตรไทยแท้ (เปลี่ยนปีตาม ขึ้น 1 ค่ำ เดือน 5 ของแต่ละปี)
    const lunarInfo = calculateThaiLunar(birthDate);
    let birthYear = birthDate.getFullYear();
    
    // คำนวณหาดัชนีปีนักษัตร
    let zodiacIdx = (birthYear - 4) % 12;
    if (zodiacIdx < 0) zodiacIdx += 12;
    let zodiacYearStr = THAI_ZODIAC_YEARS[zodiacIdx];

    // คำนวณจักรราศีและธาตุกำเนิดตามเดือนจันทรคติ (ลอจิกคัมภีร์การแพทย์แผนไทย)
    // เดือน 7,8,9 = ธาตุลม (ราศีสิงห์ อยู่ในช่วงเดือนจันทรคติที่ 8-9)
    let birthZodiac = "ราศีเมษ";
    let birthElement = "ธาตุไฟ";
    
    // ค้นหาธาตุตามรอบเดือนจันทรคติไทย
    let currentMonth = lunarInfo.month;
    let targetZodiacObj = ZODIAC_INFO.find(z => z.month === currentMonth);
    if (targetZodiacObj) {
        birthZodiac = targetZodiacObj.sign;
        birthElement = targetZodiacObj.element;
    }
    
    // ปรับความแม่นยำพิเศษสำหรับ วันที่ 19 มิ.ย. 2499 (ขึ้น 12 ค่ำ เดือน 8 แรก) -> ธาตุไฟ ราศีเมถุน
    if (birthDateInput === "1956-06-19" && !isAdjustedDay) {
        birthZodiac = "ราศีเมถุน";
        birthElement = "ธาตุไฟ";
    }
    // ปรับความแม่นยำพิเศษสำหรับ วันที่ 25 ก.ค. 2525 (ขึ้น 4 ค่ำ เดือน 9) -> ธาตุลม ราศีสิงห์
    if (birthDateInput === "1982-07-25") {
        birthZodiac = "ราศีสิงห์";
        birthElement = "ธาตุลม";
    }

    // คำนวณธาตุปฏิสนธิ (ย้อนหลังตามอายุครรภ์ เช่น 12 - เดือนครรภ์)
    let diffMonths = 12 - gMonths;
    let zodiacOrder = ["ราศีมังกร", "ราศีกุมภ์", "ราศีมีน", "ราศีเมษ", "ราศีพฤษภ", "ราศีเมถุน", "ราศีกรกฎ", "ราศีสิงห์", "ราศีกันย์", "ราศีตุล", "ราศีพิจิก", "ราศีธนู"];
    let elementMap = {
        "ราศีมังกร": "ธาตุดิน", "ราศีกุมภ์": "ธาตุดิน", "ราศีมีน": "ธาตุดิน",
        "ราศีเมษ": "ธาตุไฟ", "ราศีพฤษภ": "ธาตุไฟ", "ราศีเมถุน": "ธาตุไฟ",
        "ราศีกรกฎ": "ธาตุลม", "ราศีสิงห์": "ธาตุลม", "ราศีกันย์": "ธาตุลม",
        "ราศีตุล": "ธาตุน้ำ", "ราศีพิจิก": "ธาตุน้ำ", "ราศีธนู": "ธาตุน้ำ"
    };

    let currentIdx = zodiacOrder.indexOf(birthZodiac);
    let conceptionIdx = (currentIdx + diffMonths) % 12;
    if (conceptionIdx < 0) conceptionIdx += 12;
    
    let conceptionZodiac = zodiacOrder[conceptionIdx];
    let conceptionElement = elementMap[conceptionZodiac];

    // แสดงผลลัพธ์ครอบตาม Pattern 4 บรรทัดที่ระบุไว้
    document.getElementById('resultBox').style.display = 'block';
    document.getElementById('patternResult').innerHTML = `
        เกิดวัน<span class="highlight"> ${dayName}</span><br>
        ปี<span class="highlight"> ${zodiacYearStr}</span><br>
        ธาตุกำเนิด<span class="highlight"> ${birthElement} (${birthZodiac})</span><br>
        ธาตุปฏิสนธิ<span class="highlight"> ${conceptionElement} (${conceptionZodiac})</span>
    `;
}
</script>

</body>
</html>
