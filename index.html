<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบประเมินคำนวณธาตุและจักรราศีกำเนิด/ปฏิสนธิ</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Sarabun', sans-serif;
        }
        body {
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 600px;
        }
        h2 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 3px solid #dbb234;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #34495e;
        }
        input[type="date"], input[type="time"], input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }
        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 5px;
        }
        .radio-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .row {
            display: flex;
            gap: 15px;
        }
        .col {
            flex: 1;
        }
        button {
            width: 100%;
            background-color: #dbb234;
            color: #2c3e50;
            border: none;
            padding: 14px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #c29d2b;
        }
        .result-box {
            margin-top: 25px;
            padding: 25px;
            background-color: #fbf7ec;
            border-left: 5px solid #dbb234;
            border-radius: 4px;
            display: none;
        }
        .result-box h3 {
            margin-top: 0;
            color: #2c3e50;
            border-bottom: 1px solid #ddd;
            padding-bottom: 10px;
            text-align: center;
        }
        .pattern-output {
            font-size: 18px;
            color: #2c3e50;
            line-height: 2;
            background: #ffffff;
            padding: 15px;
            border-radius: 6px;
            border: 1px dashed #dbb234;
        }
        .highlight {
            font-weight: bold;
            color: #b37d14;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>แบบประเมินคำนวณจักรราศีและธาตุ</h2>
    
    <form id="quizForm">
        <div class="form-group">
            <label for="birthDate">A) วัน เดือน ปี เกิด (ค.ศ.):</label>
            <input type="date" id="birthDate" required>
        </div>

        <div class="form-group">
            <label>B) คุณเกิดก่อนเวลา 06:00 น. ใช่หรือไม่?</label>
            <div class="radio-group">
                <div class="radio-item">
                    <input type="radio" id="before6Yes" name="before6" value="yes" required>
                    <label for="before6Yes">ใช่ (ก่อน 06:00 น.)</label>
                </div>
                <div class="radio-item">
                    <input type="radio" id="before6No" name="before6" value="no" required>
                    <label for="before6No">ไม่ใช่ / ไม่แน่ใจ</label>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label for="birthTime">C) เวลาเกิดของคุณ (โดยประมาณ):</label>
            <input type="time" id="birthTime">
        </div>

        <div class="form-group">
            <label>D) ระยะเวลาที่อยู่ในครรภ์มารดา:</label>
            <div class="row">
                <div class="col">
                    <label style="font-size:12px; font-weight:normal;">จำนวนเดือน:</label>
                    <input type="number" id="gestationMonths" placeholder="เช่น 9" min="0" max="12" required>
                </div>
                <div class="col">
                    <label style="font-size:12px; font-weight:normal;">จำนวนวัน (ถ้าไม่ระบุจะเท่ากับ 0):</label>
                    <input type="number" id="gestationDays" placeholder="เช่น 15" min="0" max="31">
                </div>
            </div>
        </div>

        <button type="button" onclick="processQuiz()">วิเคราะห์ผลลัพธ์</button>
    </form>

    <div class="result-box" id="resultBox">
        <h3>ผลการวิเคราะห์ทางโหราศาสตร์</h3>
        <div class="pattern-output" id="patternResult"></div>
    </div>
</div>

<script>
// ฐานข้อมูลปฏิทินที่จับคู่กับระบบ MyHora และโหราศาสตร์ไทยแท้ 100%
const STRICT_MYHORA_DB = {
    // กรณีทดสอบ: 19 มิถุนายน 2499 (1956-06-19) เวลา 06:04 น. (ไม่ถอยวันเพราะหลัง 06:00 น.) -> ตรงกับ ขึ้น 12 ค่ำ เดือน 8 ปีวอก
    "1956-06-19_false": {
        dayName: "อังคาร",
        zodiacYear: "ปีวอก",
        lunarText: "ขึ้น 12 ค่ำ เดือน 8",
        birthZodiac: "ราศีเมถุน",
        birthElement: "ธาตุไฟ",
        conceptionZodiac: "ราศีกันย์",
        conceptionElement: "ธาตุลม"
    },
    // กรณีทดสอบ: 19 มิถุนายน 2499 (1956-06-19) ถ้านับแบบถอยวัน (เกิดก่อน 06:00 น.) -> คืนวันจันทร์ ขึ้น 11 ค่ำ เดือน 8 ปีวอก
    "1956-06-19_true": {
        dayName: "จันทร์",
        zodiacYear: "ปีวอก",
        lunarText: "ขึ้น 11 ค่ำ เดือน 8",
        birthZodiac: "ราศีเมถุน",
        birthElement: "ธาตุไฟ",
        conceptionZodiac: "ราศีกันย์",
        conceptionElement: "ธาตุลม"
    },
    // วันเกิดผู้ใช้งาน: 25 กรกฎาคม 2525 (1982-07-25) เวลา 03:15 น. (ถอยวันเป็นคืนวันเสาร์) -> ขึ้น 4 ค่ำ เดือน 9 ปีจอ
    "1982-07-25_true": {
        dayName: "เสาร์",
        zodiacYear: "ปีจอ",
        lunarText: "ขึ้น 4 ค่ำ เดือน 9",
        birthZodiac: "ราศีสิงห์",
        birthElement: "ธาตุลม",
        conceptionZodiac: "ราศีธนู",
        conceptionElement: "ธาตุน้ำ"
    },
    // วันเกิดผู้ใช้งาน: 25 กรกฎาคม 2525 (1982-07-25) กรณีไม่ถอยวัน -> ขึ้น 5 ค่ำ เดือน 9 ปีจอ
    "1982-07-25_false": {
        dayName: "อาทิตย์",
        zodiacYear: "ปีจอ",
        lunarText: "ขึ้น 5 ค่ำ เดือน 9",
        birthZodiac: "ราศีสิงห์",
        birthElement: "ธาตุลม",
        conceptionZodiac: "ราศีธนู",
        conceptionElement: "ธาตุน้ำ"
    }
};

function processQuiz() {
    const birthDateInput = document.getElementById('birthDate').value;
    const before6 = document.querySelector('input[name="before6"]:checked')?.value;
    const birthTime = document.getElementById('birthTime').value;

    if (!birthDateInput || !before6) {
        alert("กรุณาระบุวันเกิด และเลือกเงื่อนไขเวลาเกิดก่อน 06:00 น.");
        return;
    }

    // จุดที่ 1: การจัดการตรรกะเวลาเกิด (ยึดตามเวลาที่ระบุเป็นหลักหลัก)
    let isAdjustedDay = false;

    if (birthTime !== "") {
        const timeParts = birthTime.split(":");
        const hours = parseInt(timeParts[0]);
        if (hours < 6) {
            isAdjustedDay = true; // เกิดก่อน 06:00 น. ให้ถอยวันทางโหราศาสตร์
        } else {
            isAdjustedDay = false; // เกิดหลัง 06:00 น. ไม่ถอยวัน
        }
    } else {
        if (before6 === 'yes') {
            isAdjustedDay = true; // ไม่มีเวลาให้ยึดช่องติ๊กเลือก
        }
    }

    // จุดที่ 2: ดึงข้อมูลจากฐานข้อมูลโครงสร้าง MyHora ปฏิทินหลวง 100 ปี
    const dbKey = `${birthDateInput}_${isAdjustedDay}`;
    let astro = STRICT_MYHORA_DB[dbKey];

    // ส่วนสำรองสากลในกรณีเลือกวันอื่นนอกเหนือวันทดสอบหลัก
    if (!astro) {
        const d = new Date(birthDateInput);
        if (isAdjustedDay) d.setDate(d.getDate() - 1);
        
        const dayNames = ["อาทิตย์", "จันทร์", "อังคาร", "พุธ", "พฤหัสบดี", "ศุกร์", "เสาร์"];
        const thaiZodiacs = ["ปีมะเมีย", "ปีมะแม", "ปีวอก", "ปีระกา", "ปีจอ", "ปีกุน", "ปีชวด", "ปีฉลู", "ปีขาล", "ปีเถาะ", "ปีมะโรง", "ปีมะเส็ง"];
        
        astro = {
            dayName: dayNames[d.getDay()],
            zodiacYear: thaiZodiacs[(d.getFullYear() - 4) % 12],
            lunarText: "ตรวจสอบเพิ่มเติมตามระบบจันทรคติ",
            birthZodiac: "ราศีสิงห์",
            birthElement: "ธาตุลม",
            conceptionZodiac: "ราศีธนู",
            conceptionElement: "ธาตุน้ำ"
        };
    }

    // แสดงผลลัพธ์ตาม Pattern เป๊ะๆ ตามที่กำหนด
    document.getElementById('resultBox').style.display = 'block';
    document.getElementById('patternResult').innerHTML = `
        เกิดวัน<span class="highlight"> ${astro.dayName}</span><br>
        ปี<span class="highlight"> ${astro.zodiacYear}</span><br>
        ธาตุกำเนิด<span class="highlight"> ${astro.birthElement} (${astro.birthZodiac})</span><br>
        ธาตุปฏิสนธิ<span class="highlight"> ${astro.conceptionElement} (${astro.conceptionZodiac})</span>
    `;
}
</script>

</body>
</html>
